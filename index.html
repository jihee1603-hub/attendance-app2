<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 출석 관리</title>
<style>
  body { font-family: Arial; padding: 20px; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day { border: 1px solid #ccc; padding: 10px; min-height: 80px; }
  .academy { display: block; }
</style>
</head>
<body>

<h2>출석 달력</h2>
<div id="calendar" class="calendar"></div>

<script>
const STORAGE_KEY = "academyData";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function toggleAttendance(date, academy) {
  if (!data[date]) data[date] = {};
  data[date][academy] = !data[date][academy];
  saveData();
  render();
}

function render() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for (let i = 1; i <= 30; i++) {
    const date = `2026-04-${String(i).padStart(2, '0')}`;

    const dayDiv = document.createElement("div");
    dayDiv.className = "day";
    dayDiv.innerHTML = `<strong>${i}</strong><br>`;

    ["수학", "영어", "과학"].forEach(academy => {
      const checked = data[date]?.[academy] || false;

      const label = document.createElement("label");
      label.className = "academy";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = checked;
      checkbox.onchange = () => toggleAttendance(date, academy);

      label.appendChild(checkbox);
      label.append(` ${academy}`);

      dayDiv.appendChild(label);
    });

    calendar.appendChild(dayDiv);
  }
}

render();
</script>

</body>
</html>
