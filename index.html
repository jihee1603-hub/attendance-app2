<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 관리 프로그램</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:0; padding:20px;}
.container { display:flex; gap:20px; }
.card { background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.left { width:30%; }
.right { width:70%; }
button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
.add { background:#2ecc71; color:white; }
.delete { background:#e74c3c; color:white; }
.present { color:green; }
.absent { color:red; }
table { width:100%; border-collapse:collapse; }
td, th { padding:8px; border-bottom:1px solid #ddd; text-align:center; }
input { padding:8px; width:70%; }
</style>
</head>

<body>

<h2>📅 출석 관리 프로그램</h2>

<div class="container">

<!-- 왼쪽 -->
<div class="card left">
<h3>학생 관리</h3>
<input id="nameInput" placeholder="이름 입력">
<button class="add" onclick="addStudent()">추가</button>

<ul id="studentList"></ul>
</div>

<!-- 오른쪽 -->
<div class="card right">
<h3>출석 현황</h3>

<table>
<thead>
<tr>
<th>이름</th>
<th>상태</th>
<th>출석</th>
<th>결석</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function save() {
  localStorage.setItem("students", JSON.stringify(students));
}

function render() {
  const list = document.getElementById("studentList");
  const table = document.getElementById("tableBody");

  list.innerHTML = "";
  table.innerHTML = "";

  students.forEach((s, i) => {
    // 왼쪽 리스트
    const li = document.createElement("li");
    li.innerHTML = s.name + 
      ` <button onclick="removeStudent(${i})">삭제</button>`;
    list.appendChild(li);

    // 테이블
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${s.name}</td>
      <td class="${s.status === '출석' ? 'present' : 'absent'}">${s.status || '-'}</td>
      <td><button onclick="mark(${i}, '출석')">출석</button></td>
      <td><button onclick="mark(${i}, '결석')">결석</button></td>
    `;
    table.appendChild(tr);
  });
}

function addStudent() {
  const input = document.getElementById("nameInput");
  if (!input.value) return;

  students.push({ name: input.value, status: "" });
  input.value = "";
  save();
  render();
}

function removeStudent(i) {
  students.splice(i, 1);
  save();
  render();
}

function mark(i, status) {
  students[i].status = status;
  save();
  render();
}

render();
</script>

</body>
</html>
