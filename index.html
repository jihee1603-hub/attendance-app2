<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 관리</title>

<style>
body { font-family: sans-serif; margin:0; padding:10px; background:#f5f5f5;}
.card { background:white; padding:15px; border-radius:12px; margin-bottom:10px;}
button { padding:10px; border:none; border-radius:8px; margin:3px;}
.primary { background:#4CAF50; color:white;}
.danger { background:#f44336; color:white;}

.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day {
  background:white;
  padding:8px;
  text-align:center;
  border-radius:8px;
  min-height:60px;
}

.checked {
  background:#e8f5e9;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.week {
  font-weight:bold;
}

.sun { color:red; }
.sat { color:blue; }

.dot {
  width:6px;
  height:6px;
  border-radius:50%;
  margin:3px auto 0;
}

.note {
  font-size:10px;
  margin-top:2px;
}
</style>
</head>

<body>

<div class="card">
  <select id="academySelect" onchange="selectAcademy()"></select>
  <button class="danger" onclick="deleteAcademy()">삭제</button>
</div>

<div class="card">
  <input id="name" placeholder="학원 이름">
  <input id="count" type="number" placeholder="총 횟수">
  <input type="color" id="color">
  <button class="primary" onclick="addAcademy()">추가</button>
</div>

<div class="card">
  <h3 id="title"></h3>
  <p id="remaining"></p>
</div>

<div class="card">
  <div class="header">
    <button onclick="prevMonth()">◀</button>
    <h3 id="monthTitle"></h3>
    <button onclick="nextMonth()">▶</button>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || { academies: [] };
let current = 0;
let currentDate = new Date();

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

function addAcademy() {
  const name = document.getElementById("name").value;
  const count = parseInt(document.getElementById("count").value);
  const color = document.getElementById("color").value || "#ff0000";

  if (!name || !count) return;

  data.academies.push({
    name,
    total: count,
    color,
    attendance: [],
    notes: {}
  });

  save();
  renderList();
}

function deleteAcademy() {
  data.academies.splice(current,1);
  current = 0;
  save();
  renderList();
}

function selectAcademy() {
  current = document.getElementById("academySelect").selectedIndex;
  render();
}

function renderList() {
  const select = document.getElementById("academySelect");
  select.innerHTML = "";

  data.academies.forEach(a=>{
    const o=document.createElement("option");
    o.text=a.name;
    select.add(o);
  });

  render();
}

function render() {
  if (!data.academies.length) return;

  const a = data.academies[current];

  document.getElementById("title").innerText = a.name;
  document.getElementById("remaining").innerText =
    "남은 횟수: " + (a.total - a.attendance.length);

  renderCalendar();
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  document.getElementById("monthTitle").innerText =
    `${y}년 ${m+1}월`;

  const daysOfWeek = ["일","월","화","수","목","금","토"];

  // 요일 표시
  daysOfWeek.forEach((d,i)=>{
    const div = document.createElement("div");
    div.className = "week";
    div.innerText = d;

    if(i===0) div.classList.add("sun");
    if(i===6) div.classList.add("sat");

    cal.appendChild(div);
  });

  const firstDay = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();

  // 빈칸
  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  const a = data.academies[current];

  for (let i=1;i<=days;i++){
    const date = `${y}-${m+1}-${i}`;
    const div = document.createElement("div");
    div.className="day";

    const dayNum = document.createElement("div");
    dayNum.innerText = i;
    div.appendChild(dayNum);

    if(a.attendance.includes(date)){
      div.classList.add("checked");

      const dot = document.createElement("div");
      dot.className="dot";
      dot.style.background = a.color;
      div.appendChild(dot);
    }

    if(a.notes && a.notes[date]){
      const note = document.createElement("div");
      note.className="note";
      note.innerText = a.notes[date];
      div.appendChild(note);
    }

    div.onclick=()=>{
      const existingNote = a.notes[date] || "";
      const note = prompt("비고 입력:", existingNote);

      const idx = a.attendance.indexOf(date);

      if(idx>-1){
        a.attendance.splice(idx,1);
        delete a.notes[date];
      } else {
        a.attendance.push(date);
        if(note) a.notes[date]=note;
      }

      save();
      render();
    };

    cal.appendChild(div);
  }
}

function prevMonth(){
  currentDate.setMonth(currentDate.getMonth()-1);
  render();
}

function nextMonth(){
  currentDate.setMonth(currentDate.getMonth()+1);
  render();
}

renderList();
</script>

</body>
</html>
