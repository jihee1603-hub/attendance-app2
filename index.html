<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 출석 관리</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
    padding: 20px;
  }

  h2 {
    margin-bottom: 10px;
  }

  .top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
  }

  .academy-list {
    margin-bottom: 15px;
  }

  .academy-item {
    display: inline-block;
    background: #fff;
    padding: 5px 10px;
    margin: 3px;
    border-radius: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .academy-item button {
    background: red;
    margin-left: 5px;
    padding: 2px 6px;
    font-size: 12px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }

  .day {
    background: white;
    border-radius: 12px;
    padding: 10px;
    min-height: 100px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  }

  .date {
    font-weight: bold;
    margin-bottom: 5px;
  }

  .bar {
    height: 8px;
    border-radius: 4px;
    margin: 4px 0;
    cursor: pointer;
    opacity: 0.3;
  }

  .checked {
    opacity: 1;
  }
</style>
</head>
<body>

<h2>출석 달력</h2>

<div class="top">
  <input type="text" id="academyInput" placeholder="학원 이름">
  <button onclick="addAcademy()">추가</button>
</div>

<div id="academyList" class="academy-list"></div>

<div id="calendar" class="calendar"></div>
