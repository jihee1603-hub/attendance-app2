<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 관리</title>

<style>
body { font-family: sans-serif; margin:0; padding:10px; background:#f5f5f5;}
.card { background:white; padding:15px; border-radius:12px; margin-bottom:10px;}
button { padding:10px; border:none; border-radius:8px; margin:3px;}
.primary { background:#4CAF50; color:white;}
.danger { background:#f44336; color:white;}

.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

/* 요일 */
.week {
  text-align:center;
  font-weight:bold;
}
.sun { color:red; }
.sat { color:blue; }

/* 날짜칸 */
.day {
  background:white;
  border-radius:8px;
  aspect-ratio:1/1; /* 정사각형 */
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:5px;
  font-size:14px;
}

/* 날짜 숫자 */
.day-number {
  font-weight:bold;
}

/* 가로 막대 */
.bar {
  width:90%;
  height:6px;
  border-radius:4px;
  margin-top:2px;
}
</style>
</head>

<body>

<div class="card">
  <input id="name" placeholder="학원 이름">
  <input id="count" type="number" placeholder="총 횟수">
  <input type="color" id="color">

  <div>
    요일 선택:
    <label><input type="checkbox" value="0">일</label>
    <label><input type="checkbox" value="1">월</label>
    <label><input type="checkbox" value="2">화</label>
    <label><input type="checkbox" value="3">수</label>
    <label><input type="checkbox" value="4">목</label>
    <label><input type="checkbox" value="5">금</label>
    <label><input type="checkbox" value="6">토</label>
  </div>

  <button class="primary" onclick="addAcademy()">추가</button>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;">
    <button onclick="prevMonth()">◀</button>
    <h3 id="monthTitle"></h3>
    <button onclick="nextMonth()">▶</button>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || { academies: [] };
let currentDate = new Date();

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

/* 학원 추가 */
function addAcademy() {
  const name = document.getElementById("name").value;
  const count = parseInt(document.getElementById("count").value);
  const color = document.getElementById("color").value;

  const days = [];
  document.querySelectorAll("input[type=checkbox]:checked").forEach(c=>{
    days.push(parseInt(c.value));
  });

  if (!name || !count || days.length === 0) return;

  data.academies.push({
    name,
    total: count,
    color,
    days,
    attendance: []
  });

  save();
  render();
}

/* 달력 렌더 */
function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  document.getElementById("monthTitle").innerText =
    `${y}년 ${m+1}월`;

  const daysOfWeek = ["일","월","화","수","목","금","토"];

  // 요일 헤더
  daysOfWeek.forEach((d,i)=>{
    const div = document.createElement("div");
    div.className="week";
    div.innerText=d;

    if(i===0) div.classList.add("sun");
    if(i===6) div.classList.add("sat");

    cal.appendChild(div);
  });

  const firstDay = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=days;i++){
    const date = new Date(y,m,i);
    const day = date.getDay();

    const div = document.createElement("div");
    div.className="day";

    const num = document.createElement("div");
    num.className="day-number";
    num.innerText=i;

    if(day===0) num.style.color="red";
    if(day===6) num.style.color="blue";

    div.appendChild(num);

    // 해당 요일 학원 필터
    const todays = data.academies.filter(a => a.days.includes(day));

    // 최대 5개만 표시
    todays.slice(0,5).forEach(a=>{
      const bar = document.createElement("div");
      bar.className="bar";
      bar.style.background = a.color;
      div.appendChild(bar);
    });

    // 클릭 → 출석 체크
    div.onclick=()=>{
      todays.forEach(a=>{
        const dateStr = `${y}-${m+1}-${i}`;
        const idx = a.attendance.indexOf(dateStr);

        if(idx>-1) {
          a.attendance.splice(idx,1);
        } else {
          a.attendance.push(dateStr);
        }
      });

      save();
      render();
    };

    cal.appendChild(div);
  }
}

function prevMonth(){
  currentDate.setMonth(currentDate.getMonth()-1);
  render();
}

function nextMonth(){
  currentDate.setMonth(currentDate.getMonth()+1);
  render();
}

function render(){
  renderCalendar();
}

render();
</script>

</body>
</html>
