<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 관리</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: sans-serif; margin:0; padding:10px; background:#f5f5f5;}
.card { background:white; padding:15px; border-radius:12px; margin-bottom:10px;}
button { padding:10px; border:none; border-radius:8px; margin:3px;}
.primary { background:#4CAF50; color:white;}
.danger { background:#f44336; color:white;}
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.day { background:white; padding:10px; text-align:center; border-radius:8px;}
.checked { background:#4CAF50; color:white;}
.header { display:flex; justify-content:space-between; align-items:center;}
</style>
</head>

<body>

<div class="card">
  <select id="academySelect" onchange="selectAcademy()"></select>
  <button class="danger" onclick="deleteAcademy()">삭제</button>
</div>

<div class="card">
  <input id="name" placeholder="학원 이름">
  <input id="count" type="number" placeholder="총 횟수">
  <button class="primary" onclick="addAcademy()">추가</button>
</div>

<div class="card">
  <h3 id="title"></h3>
  <p id="remaining"></p>
</div>

<div class="card">
  <div class="header">
    <button onclick="prevMonth()">◀</button>
    <h3 id="monthTitle"></h3>
    <button onclick="nextMonth()">▶</button>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<div class="card">
  <button onclick="backup()">☁️ 백업</button>
  <button onclick="restore()">📥 복원</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase 설정 (여기 본인 키 넣기) */
const firebaseConfig = {
  apiKey: "여기에입력",
  authDomain: "여기에입력",
  projectId: "여기에입력"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = JSON.parse(localStorage.getItem("data")) || { academies: [] };
let current = 0;
let currentDate = new Date();

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

window.addAcademy = function() {
  const name = document.getElementById("name").value;
  const count = parseInt(document.getElementById("count").value);
  if (!name || !count) return;

  data.academies.push({ name, total: count, attendance: [] });
  save();
  renderList();
}

window.deleteAcademy = function() {
  data.academies.splice(current,1);
  current = 0;
  save();
  renderList();
}

window.selectAcademy = function() {
  current = document.getElementById("academySelect").selectedIndex;
  render();
}

function renderList() {
  const select = document.getElementById("academySelect");
  select.innerHTML = "";
  data.academies.forEach(a=>{
    const o=document.createElement("option");
    o.text=a.name;
    select.add(o);
  });
  render();
}

function render() {
  if (!data.academies.length) return;

  const a = data.academies[current];
  document.getElementById("title").innerText = a.name;
  document.getElementById("remaining").innerText =
    "남은 횟수: " + (a.total - a.attendance.length);

  renderCalendar();
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  document.getElementById("monthTitle").innerText =
    `${y}년 ${m+1}월`;

  const days = new Date(y, m+1, 0).getDate();
  const a = data.academies[current];

  for (let i=1;i<=days;i++){
    const date = `${y}-${m+1}-${i}`;
    const div = document.createElement("div");
    div.className="day";
    div.innerText=i;

    if(a.attendance.includes(date)) div.classList.add("checked");

    div.onclick=()=>{
      const idx=a.attendance.indexOf(date);
      if(idx>-1) a.attendance.splice(idx,1);
      else a.attendance.push(date);
      save();
      render();
    };

    cal.appendChild(div);
  }
}

window.prevMonth = function(){
  currentDate.setMonth(currentDate.getMonth()-1);
  render();
}

window.nextMonth = function(){
  currentDate.setMonth(currentDate.getMonth()+1);
  render();
}

/* ☁️ 백업 */
window.backup = async function(){
  await setDoc(doc(db,"backup","user1"), data);
  alert("백업 완료");
}

/* 📥 복원 */
window.restore = async function(){
  const docSnap = await getDoc(doc(db,"backup","user1"));
  if(docSnap.exists()){
    data = docSnap.data();
    save();
    renderList();
    alert("복원 완료");
  }
}

renderList();

/* PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
