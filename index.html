<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 출석 관리</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
    padding: 20px;
  }

  h2 {
    margin-bottom: 10px;
  }

  .top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
  }

  .academy-list {
    margin-bottom: 15px;
  }

  .academy-item {
    display: inline-block;
    background: #fff;
    padding: 5px 10px;
    margin: 3px;
    border-radius: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .academy-item button {
    background: red;
    margin-left: 5px;
    padding: 2px 6px;
    font-size: 12px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }

  .day {
    background: white;
    border-radius: 12px;
    padding: 10px;
    min-height: 100px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  }

  .date {
    font-weight: bold;
    margin-bottom: 5px;
  }

  .bar {
    height: 8px;
    border-radius: 4px;
    margin: 4px 0;
    cursor: pointer;
    opacity: 0.3;
  }

  .checked {
    opacity: 1;
  }
</style>
</head>
<body>

<h2>출석 달력</h2>

<div class="top">
  <input type="text" id="academyInput" placeholder="학원 이름">
  <button onclick="addAcademy()">추가</button>
</div>

<div id="academyList" class="academy-list"></div>

<div id="calendar" class="calendar"></div>

<script>
const STORAGE_KEY = "academyData";
const ACADEMY_KEY = "academyList";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
let academies = JSON.parse(localStorage.getItem(ACADEMY_KEY)) || ["수학","영어","과학"];

const colors = ["#ff7675","#74b9ff","#55efc4","#ffeaa7","#a29bfe","#fd79a8"];

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveAcademies() {
  localStorage.setItem(ACADEMY_KEY, JSON.stringify(academies));
}

function addAcademy() {
  const input = document.getElementById("academyInput");
  const name = input.value.trim();
  if (!name || academies.includes(name)) return;

  academies.push(name);
  saveAcademies();
  input.value = "";
  render();
}

function removeAcademy(name) {
  academies = academies.filter(a => a !== name);

  Object.keys(data).forEach(date => {
    delete data[date]?.[name];
  });

  saveAcademies();
  saveData();
  render();
}

function toggleAttendance(date, academy) {
  if (!data[date]) data[date] = {};
  data[date][academy] = !data[date][academy];
  saveData();
  render();
}

function renderAcademyList() {
  const list = document.getElementById("academyList");
  list.innerHTML = "";

  academies.forEach((name, i) => {
    const div = document.createElement("div");
    div.className = "academy-item";
    div.style.borderLeft = `5px solid ${colors[i % colors.length]}`;

    div.textContent = name;

    const btn = document.createElement("button");
    btn.textContent = "x";
    btn.onclick = () => removeAcademy(name);

    div.appendChild(btn);
    list.appendChild(div);
  });
}

function render() {
  renderAcademyList();

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for (let i = 1; i <= 30; i++) {
    const date = `2026-04-${String(i).padStart(2, '0')}`;

    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const dateDiv = document.createElement("div");
    dateDiv.className = "date";
    dateDiv.textContent = i;

    dayDiv.appendChild(dateDiv);

    academies.forEach((academy, idx) => {
      const isChecked = data[date]?.[academy];

      const bar = document.createElement("div");
      bar.className = "bar" + (isChecked ? " checked" : "");
      bar.style.background = colors[idx % colors.length];

      bar.onclick = () => toggleAttendance(date, academy);

      dayDiv.appendChild(bar);
    });

    calendar.appendChild(dayDiv);
  }
}

render();
</script>

</body>
</html>
